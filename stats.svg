<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#0D0D0D" rx="10" stroke="#e19bb7" stroke-width="2"/>

  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text x="30" y="50" fill="#e19bb7" font-family="monospace" font-size="22" font-weight="bold" filter="url(#neonGlow)">
    uhqstraizo's Stats
  </text>

  <text x="30" y="100" fill="#f5d0df" font-family="monospace" font-size="16">⭐ Total Stars: 7</text>
  <text x="30" y="130" fill="#f5d0df" font-family="monospace" font-size="16">🔥 Commits (2024): 448</text>
  <text x="30" y="160" fill="#f5d0df" font-family="monospace" font-size="16">👑 Hack Level: Over 9000</text>
</svg>
